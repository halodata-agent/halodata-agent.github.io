<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#ffffff">
<title>Halodata – Tanya Rumus Spreadsheet & SQL</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Fira+Code:wght@400;500&display=swap');
  :root{
    --bg:#f5f6f8;--surface:#fff;--surface-2:#f0f2f5;--border:#e4e6ea;--border-mid:#d0d3d9;
    --ink:#111318;--ink-2:#4a4f5c;--ink-3:#9098a8;
    --green:#1a6e3c;--green-bg:#edf7f2;--green-mid:#b6dfc8;
    --purple:#5b3fb5;--purple-bg:#f0ecfb;
    --orange:#b84c00;--orange-bg:#fff4ec;--orange-mid:#fcd5b0;
    --blue:#1a56c4;--blue-bg:#eef3fd;--blue-mid:#bcd3f5;
    --radius:14px;--radius-sm:8px;
    --font:'Plus Jakarta Sans','Montserrat','Roboto',sans-serif;
    --mono:'Fira Code','Courier New',monospace;
    --shadow:0 1px 4px rgba(0,0,0,.06),0 4px 16px rgba(0,0,0,.06);
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}
  .app{display:flex;flex-direction:column;height:100dvh;max-width:800px;margin:0 auto}
  .header{padding:14px 20px 12px;background:var(--surface);border-bottom:1.5px solid var(--border);flex-shrink:0}
  .header-top{display:flex;align-items:center;gap:12px}
  .logo{width:38px;height:38px;border-radius:11px;background:linear-gradient(135deg,#1a6e3c,#2da55e);display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;box-shadow:0 2px 8px rgba(26,110,60,.25)}
  .header-text h1{font-size:17px;font-weight:800;letter-spacing:-.3px}
  .header-text p{font-size:12px;color:var(--ink-3);margin-top:1px}
  .header-actions{margin-left:auto;display:flex;align-items:center;gap:8px}
  .lang-toggle{display:flex;background:var(--surface-2);border-radius:8px;padding:3px;gap:2px}
  .lang-btn{border:none;background:transparent;font-family:var(--font);font-size:11px;font-weight:700;color:var(--ink-3);padding:4px 9px;border-radius:6px;cursor:pointer;transition:all .13s}
  .lang-btn.active{background:var(--surface);color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.1)}
  .mode-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:20px;background:var(--green-bg);color:var(--green);border:1px solid var(--green-mid)}
  .gear{width:34px;height:34px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-size:15px;display:flex;align-items:center;justify-content:center;transition:all .13s}
  .gear:hover{background:var(--surface-2);border-color:var(--border-mid)}
  .tabs{display:flex;gap:6px;margin-top:12px;background:var(--surface-2);padding:4px;border-radius:11px}
  .tab{flex:1;padding:8px 6px;border:none;background:transparent;border-radius:8px;font-family:var(--font);font-size:12.5px;font-weight:700;color:var(--ink-3);cursor:pointer;transition:all .14s;display:flex;align-items:center;justify-content:center;gap:5px}
  .tab.active{background:var(--surface);color:var(--ink);box-shadow:0 1px 3px rgba(0,0,0,.1)}
  .tab .ti{font-size:14px}
  .chat-area{flex:1;overflow-y:auto;padding:20px 16px;display:flex;flex-direction:column;gap:20px;scroll-behavior:smooth}
  .chat-area::-webkit-scrollbar{width:4px}.chat-area::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
  .welcome-title{font-size:22px;font-weight:800;letter-spacing:-.5px;line-height:1.25;margin-bottom:8px}
  .welcome-sub{font-size:14px;color:var(--ink-2);line-height:1.65;margin-bottom:18px}
  .welcome-sub strong{color:var(--ink)}
  .examples-label{font-size:11px;font-weight:700;color:var(--ink-3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px}
  .examples-grid{display:flex;flex-direction:column;gap:8px}
  .example-btn{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;font-family:var(--font);font-size:13.5px;color:var(--ink);cursor:pointer;text-align:left;line-height:1.45;display:flex;align-items:flex-start;gap:10px;transition:all .14s}
  .example-btn:hover{border-color:var(--green);background:var(--green-bg);color:var(--green);transform:translateX(2px)}
  .example-btn .eicon{font-size:16px;flex-shrink:0;margin-top:1px}
  .msg-user{display:flex;justify-content:flex-end}
  .msg-user .bubble{background:var(--ink);color:#fff;padding:11px 16px;border-radius:18px 18px 4px 18px;max-width:80%;font-size:14px;line-height:1.55}
  .msg-ai{display:flex;flex-direction:column;gap:10px}
  .ai-header{display:flex;align-items:center;gap:8px}
  .ai-avatar{width:26px;height:26px;border-radius:7px;background:linear-gradient(135deg,#1a6e3c,#2da55e);display:flex;align-items:center;justify-content:center;font-size:13px}
  .ai-name{font-size:12px;font-weight:700;color:var(--green)}
  .src-tag{font-size:10px;font-weight:600;padding:2px 7px;border-radius:10px}
  .src-local{background:var(--green-bg);color:var(--green)}
  .src-ai{background:var(--purple-bg);color:var(--purple)}
  .answer-blocks{display:flex;flex-direction:column;gap:10px}
  .block{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow)}
  .block-header{display:flex;align-items:center;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border)}
  .block-icon{font-size:14px}
  .block-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
  .block-body{padding:14px}
  .block.b-formula{border-color:var(--green-mid)}.block.b-formula .block-header{background:var(--green-bg)}.block.b-formula .block-label{color:var(--green)}
  .formula-pill{font-family:var(--mono);font-size:15px;font-weight:500;color:var(--green);background:var(--green-bg);border:1.5px solid var(--green-mid);padding:11px 14px;border-radius:var(--radius-sm);word-break:break-word;line-height:1.5;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:8px;transition:background .13s;user-select:none}
  .formula-pill:hover{background:#d5f0e3}.formula-pill.copied{background:#c7f5dd}
  .formula-variant-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-3);margin-bottom:5px;margin-top:4px;display:flex;align-items:center;gap:5px}
  .formula-variant-label .vi{font-size:12px}
  .copy-hint{font-size:11px;color:var(--ink-3);font-family:var(--font);flex-shrink:0}
  .formula-example{margin-top:10px;font-size:13px;color:var(--ink-2);line-height:1.55}
  .formula-example code{font-family:var(--mono);font-size:12.5px;color:var(--green);background:var(--green-bg);padding:2px 7px;border-radius:4px;word-break:break-word}
  .sep-note{margin-top:10px;padding:9px 12px;background:var(--blue-bg);border:1px solid var(--blue-mid);border-radius:var(--radius-sm);font-size:12px;color:#1e40af;line-height:1.5}
  .sep-note code{font-family:var(--mono)}
  .block.b-illustration{border-color:#c7d2fe}.block.b-illustration .block-header{background:#eef2ff}.block.b-illustration .block-label{color:#3730a3}
  .mini-sheet{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .mini-sheet table{border-collapse:collapse;font-size:13px}
  .mini-sheet th,.mini-sheet td{padding:7px 13px;text-align:left;border:1px solid #dde1ea;white-space:nowrap}
  .mini-sheet th{background:#f3f4f8;font-size:11px;font-weight:700;color:var(--ink-2);text-transform:uppercase;letter-spacing:.3px}
  .mini-sheet .ch{background:#e8ebf2;color:var(--ink-3);font-weight:700;text-align:center;width:30px;min-width:30px;font-size:11px}
  .mini-sheet .cell-formula{background:var(--green-bg);color:var(--green);font-family:var(--mono);font-size:12px}
  .mini-sheet .cell-result{background:#fef9ec;color:#7c5e10;font-family:var(--mono);font-weight:600}
  .sheet-note{margin-top:10px;font-size:12.5px;color:var(--ink-2);line-height:1.55}
  .block.b-explain{border-color:#ddd6fe}.block.b-explain .block-header{background:var(--purple-bg)}.block.b-explain .block-label{color:var(--purple)}
  .explain-summary{font-size:14px;line-height:1.65}
  .anatomy{margin-top:12px;display:flex;flex-direction:column;gap:7px}
  .anatomy-row{display:flex;gap:10px;align-items:flex-start;padding:9px 11px;background:var(--surface-2);border-radius:var(--radius-sm)}
  .anat-part{font-family:var(--mono);font-size:12px;font-weight:500;color:var(--green);background:var(--green-bg);border:1px solid var(--green-mid);padding:3px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0}
  .anat-desc{font-size:13px;color:var(--ink-2);line-height:1.5}
  .tip-box{margin-top:12px;padding:10px 13px;background:#fffbeb;border:1px solid #fde68a;border-radius:var(--radius-sm);font-size:13px;color:#78460f;line-height:1.55}
  .block.b-related{border-color:var(--orange-mid)}.block.b-related .block-header{background:var(--orange-bg)}.block.b-related .block-label{color:var(--orange)}
  .related-list{display:flex;flex-direction:column;gap:8px}
  .related-item{display:flex;gap:10px;align-items:flex-start}
  .rel-chip{font-family:var(--mono);font-size:13px;font-weight:500;color:var(--orange);background:var(--orange-bg);border:1.5px solid var(--orange-mid);padding:5px 11px;border-radius:6px;cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .12s}
  .rel-chip:hover{background:var(--orange-mid);border-color:#f97316}
  .rel-chip.disabled{cursor:default;opacity:.7}.rel-chip.disabled:hover{background:var(--orange-bg);border-color:var(--orange-mid)}
  .rel-desc{font-size:13px;color:var(--ink-2);line-height:1.5;padding-top:5px}
  .thinking{display:flex;align-items:center;gap:10px;padding:14px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
  .dots{display:flex;gap:5px}.dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:bounce 1.1s infinite}
  .dot:nth-child(2){animation-delay:.18s}.dot:nth-child(3){animation-delay:.36s}
  @keyframes bounce{0%,80%,100%{transform:translateY(0);opacity:.35}40%{transform:translateY(-7px);opacity:1}}
  .thinking-text{font-size:13px;color:var(--ink-3)}
  .notfound{padding:14px;background:#fffbeb;border:1.5px solid #fde68a;border-radius:var(--radius);font-size:13.5px;color:#78460f;line-height:1.6}
  .notfound strong{color:#92400e}
  .nf-btn{margin-top:10px;display:inline-block;background:var(--purple);color:#fff;border:none;padding:8px 14px;border-radius:8px;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:background .13s}
  .nf-btn:hover{background:#4a319c}
  .err-block{padding:14px;background:#fef2f2;border:1.5px solid #fca5a5;border-radius:var(--radius);font-size:13.5px;color:#991b1b;line-height:1.55}
  .input-area{padding:12px 16px 18px;background:var(--surface);border-top:1.5px solid var(--border);flex-shrink:0}
  .input-row{display:flex;gap:8px;align-items:flex-end}
  .input-wrap{flex:1;background:var(--bg);border:2px solid var(--border);border-radius:12px;overflow:hidden;transition:border-color .15s}
  .input-wrap:focus-within{border-color:var(--green)}
  textarea{width:100%;font-family:var(--font);font-size:14px;color:var(--ink);background:transparent;border:none;outline:none;resize:none;padding:11px 14px;min-height:44px;max-height:120px;line-height:1.5}
  textarea::placeholder{color:var(--ink-3)}
  .send-btn{width:44px;height:44px;background:var(--green);border:none;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:20px;color:#fff;transition:all .13s}
  .send-btn:hover:not(:disabled){background:#155c31;transform:scale(1.05)}
  .send-btn:disabled{background:var(--border-mid);cursor:not-allowed}
  .input-hint{font-size:11px;color:var(--ink-3);margin-top:8px;text-align:center}
  .overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:center;justify-content:center;padding:20px;z-index:50}
  .overlay.open{display:flex}
  .modal{background:var(--surface);border-radius:16px;max-width:440px;width:100%;padding:22px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
  .modal h2{font-size:17px;font-weight:800;margin-bottom:6px}
  .modal p{font-size:13px;color:var(--ink-2);line-height:1.6;margin-bottom:16px}
  .modal label{font-size:12px;font-weight:700;color:var(--ink-2);display:block;margin-bottom:6px}
  .modal input{width:100%;font-family:var(--mono);font-size:13px;padding:11px 13px;border:2px solid var(--border);border-radius:10px;outline:none;transition:border-color .15s}
  .modal input:focus{border-color:var(--green)}
  .modal-note{font-size:11.5px;color:var(--ink-3);margin-top:8px;line-height:1.5}
  .modal-actions{display:flex;gap:8px;margin-top:18px}
  .btn-primary{flex:1;background:var(--green);color:#fff;border:none;padding:11px;border-radius:10px;font-family:var(--font);font-weight:700;font-size:14px;cursor:pointer;transition:background .13s}
  .btn-primary:hover{background:#155c31}
  .btn-ghost{background:var(--surface-2);color:var(--ink-2);border:none;padding:11px 16px;border-radius:10px;font-family:var(--font);font-weight:600;font-size:14px;cursor:pointer}
  .btn-ghost:hover{background:var(--border)}
  .key-status{font-size:12px;font-weight:600;margin-top:10px;padding:8px 11px;border-radius:8px}
  .key-on{background:var(--green-bg);color:var(--green)}.key-off{background:var(--surface-2);color:var(--ink-3)}
  @media(max-width:480px){.welcome-title{font-size:19px}.formula-pill{font-size:13px}.chat-area{padding:16px 12px}.tab{font-size:11.5px}.tab .ti{font-size:13px}}
  /* fix: cegah halaman melebar horizontal di mobile */
  html,body{max-width:100%;overflow-x:hidden}
  .app{width:100%;overflow-x:hidden}
  .chat-area{overflow-x:hidden;min-width:0}
  .msg-ai,.answer-blocks,.block,.block-body,.msg-user{min-width:0;max-width:100%}
  .msg-user .bubble{overflow-wrap:anywhere;word-break:break-word}
  .formula-pill,code{overflow-wrap:anywhere}
</style>
</head>
<body>
<div class="app">
  <header class="header">
    <div class="header-top">
      <div class="logo">📊</div>
      <div class="header-text"><h1>Halodata</h1><p id="tagline"></p></div>
      <div class="header-actions">
        <div class="lang-toggle">
          <button class="lang-btn active" data-lang="id" onclick="setLang('id')">ID</button>
          <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
        </div>
        <span class="mode-badge" id="modeBadge">Offline</span>
        <button class="gear" onclick="openSettings()" title="Settings">⚙️</button>
      </div>
    </div>
    <div class="tabs" id="tabs">
      <button class="tab active" data-plat="spreadsheet" onclick="setPlatform('spreadsheet')"><span class="ti">📗</span> <span data-i18n="tab_sheet">Excel / Sheets</span></button>
      <button class="tab" data-plat="sql" onclick="setPlatform('sql')"><span class="ti">🗄️</span> SQL</button>
    </div>
  </header>
  <div class="chat-area" id="chatArea"></div>
  <div class="input-area">
    <div class="input-row">
      <div class="input-wrap"><textarea id="userInput" rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea></div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">↑</button>
    </div>
    <p class="input-hint" id="inputHint"></p>
  </div>
</div>

<div class="overlay" id="overlay" onclick="if(event.target===this)closeSettings()">
  <div class="modal">
    <h2 id="set_title"></h2>
    <p id="set_desc"></p>
    <label id="set_label" for="apiKeyInput"></label>
    <input type="password" id="apiKeyInput" placeholder="sk-ant-..." autocomplete="off">
    <p class="modal-note" id="set_note"></p>
    <div class="key-status" id="keyStatus"></div>
    <div class="modal-actions">
      <button class="btn-primary" id="set_save" onclick="saveSettings()"></button>
      <button class="btn-ghost" id="set_clear" onclick="clearKey()"></button>
      <button class="btn-ghost" id="set_close" onclick="closeSettings()"></button>
    </div>
  </div>
</div>

<script>

/* ════════════ SEARCH ════════════ */
function normalize(s){return s.toLowerCase().replace(/[^\w\s]/g,' ').replace(/\s+/g,' ').trim();}
function searchKB(query, platform){
  const q=normalize(query);
  const words=q.split(' ').filter(w=>w.length>2);
  let best=null,bestScore=0;
  for(const id in KB){
    const item=KB[id];
    if(item.plat!==platform) continue;
    let score=0;
    for(const kw of item.kw){
      const nkw=normalize(kw);
      if(q.includes(nkw)) score+=nkw.split(' ').length*3;
      else for(const w of words){ if(nkw.includes(w)||w.includes(nkw)) score+=1; }
    }
    const nameBoth=normalize(L(item.name)+' '+item.name.id+' '+item.name.en);
    for(const w of words){ if(nameBoth.includes(w)) score+=2; }
    if(score>bestScore){bestScore=score;best=id;}
  }
  return bestScore>=3 ? best : null;
}

  }
  const exTxt=L(f.example);
  const exHTML=exTxt?'<div class="formula-example"><strong>'+t('example_word')+'</strong> <code>'+esc(exTxt)+'</code></div>':'';
  const sepHTML=(!isSQL && d.sepSensitive)?'<div class="sep-note">'+t('sep_note')+'</div>':'';
  const b1='<div class="block b-formula"><div class="block-header"><span class="block-icon">'+(isSQL?'🗄️':'🔢')+'</span><span class="block-label">'+(isSQL?t('lbl_formula_sql'):t('lbl_formula_sheet'))+'</span></div><div class="block-body">'+formulaInner+exHTML+sepHTML+'</div></div>';

  // ---- Block 2: illustration ----
  let b2='';
  const il=d.illus;
  if(il && il.headers && il.rows){
    const cl=il.headers.map((_,i)=>'<th class="ch">'+(isSQL?'':String.fromCharCode(65+i))+'</th>').join('');
    const cn=il.headers.map(h=>'<th>'+esc(h)+'</th>').join('');
    const rows=il.rows.map((row,ri)=>{
      const cells=row.map(cell=>{const s=String(cell||'');const isF=s.startsWith('=');const isR=!isF&&/[0-9]/.test(s)&&ri===il.rows.length-1;return '<td class="'+(isF?'cell-formula':(isR?'cell-result':''))+'">'+esc(s)+'</td>';}).join('');
      return '<tr>'+(isSQL?'':'<td class="ch">'+(ri+1)+'</td>')+cells+'</tr>';
    }).join('');
    const corner=isSQL?'':'<th class="ch"></th>';
    const head=(isSQL?'':'<tr>'+corner+cl+'</tr>')+'<tr>'+corner+cn+'</tr>';
    const note=il.note?'<div class="sheet-note">💡 '+esc(L(il.note))+'</div>':'';
    b2='<div class="block b-illustration"><div class="block-header"><span class="block-icon">📋</span><span class="block-label">'+(isSQL?t('lbl_illus_sql'):t('lbl_illus_sheet'))+(il.title?' – '+esc(L(il.title)):'')+'</span></div><div class="block-body"><div class="mini-sheet"><table><thead>'+head+'</thead><tbody>'+rows+'</tbody></table></div>'+note+'</div></div>';
  }

  // ---- Block 3: explanation ----
  const e=d.expl;
  const anat=(e.anatomy||[]).map(a=>'<div class="anatomy-row"><span class="anat-part">'+esc(a.part)+'</span><span class="anat-desc">'+esc(L(a.meaning))+'</span></div>').join('');
  const tip=e.tip?'<div class="tip-box">💬 <strong>'+t('tip_word')+'</strong> '+esc(L(e.tip))+'</div>':'';
  const b3='<div class="block b-explain"><div class="block-header"><span class="block-icon">💡</span><span class="block-label">'+(isSQL?t('lbl_explain_sql'):t('lbl_explain_sheet'))+'</span></div><div class="block-body"><div class="explain-summary">'+esc(L(e.summary))+'</div>'+(anat?'<div class="anatomy">'+anat+'</div>':'')+tip+'</div></div>';

  // ---- Block 4: related ----
  let b4='';
  if(d.related && d.related.length){
    const items=d.related.map(rid=>{
      const r=KB[rid];
      if(!r) return '';
      const token=(r.plat==='sql')?r.formula.sql.split(/[\s(]/)[0]:r.formula.excel.split(/[\s(]/)[0].replace('=','');
      return '<div class="related-item"><span class="rel-chip" onclick="showById(\''+rid+'\')">'+esc(token)+'</span><span class="rel-desc">'+esc(L(r.name))+'</span></div>';
    }).filter(Boolean).join('');
    b4='<div class="block b-related"><div class="block-header"><span class="block-icon">🔗</span><span class="block-label">'+(isSQL?t('lbl_related_sql'):t('lbl_related_sheet'))+'</span></div><div class="block-body"><div class="related-list">'+items+'</div></div></div>';
  }

  const tag=source==='ai'?'<span class="src-tag src-ai">AI</span>':'<span class="src-tag src-local">offline</span>';
  appendEl('<div class="msg-ai"><div class="ai-header"><div class="ai-avatar">📊</div><span class="ai-name">Halodata</span>'+tag+'</div><div class="answer-blocks">'+b1+b2+b3+b4+'</div></div>');
}

function showById(id){
  if(!KB[id])return;
  if(KB[id].plat!==currentPlatform) setPlatform(KB[id].plat);
  const wb=document.getElementById('welcomeBlock'); if(wb) wb.remove();
  showUserMsg(t('explain_prefix')+L(KB[id].name));
  renderEntry(id,'local');
  document.getElementById('userInput').focus();
}

/* ════════════ AI FALLBACK ════════════ */
function extractJSON(text){try{return JSON.parse(text.trim());}catch(_){}let c=text.replace(/^```(?:json)?\s*/m,'').replace(/```\s*$/m,'').trim();try{return JSON.parse(c);}catch(_){}const s=text.indexOf('{'),en=text.lastIndexOf('}');if(s!==-1&&en>s){try{return JSON.parse(text.slice(s,en+1));}catch(_){}}throw new Error('parse');}

function aiSystem(isSQL){
  const langName = LANG==='en'?'English':'Indonesian';
  if(isSQL) return 'You are Halodata, an SQL helper for beginners. Reply ONLY valid JSON (no other text, no code fence): {"formula":{"sql":"SELECT ...","example":"..."},"illus":{"title":"...","headers":["col1","col2"],"rows":[["d1","d2"]],"note":"..."},"expl":{"summary":"...","anatomy":[{"part":"...","meaning":"..."}],"tip":"..."},"related":[{"name":"CMD","kegunaan":"..."}]}. Answer in '+langName+', friendly for beginners.';
  return 'You are Halodata, an Excel & Google Sheets helper for beginners. Reply ONLY valid JSON (no other text, no code fence): {"formula":{"excel":"=...","sheets":"=...","example":"..."},"illus":{"title":"...","headers":["Column A","Column B"],"rows":[["data","=FORMULA()"]],"note":"..."},"expl":{"summary":"...","anatomy":[{"part":"...","meaning":"..."}],"tip":"..."},"related":[{"name":"=FORMULA()","kegunaan":"..."}]}. If Excel and Sheets differ, fill both; if same, use the same string for both. Answer in '+langName+', friendly for beginners.';
}

function renderAI(d,isSQL){
  const f=d.formula||{};
  let formulaInner='';
  if(isSQL){formulaInner=pillHTML(f.sql||'');}
  else{const ex=f.excel||'',sh=f.sheets||ex; if(ex===sh){formulaInner=pillHTML(ex);}else{formulaInner='<div class="formula-variant-label"><span class="vi">📘</span>'+t('excel_ver')+'</div>'+pillHTML(ex)+'<div class="formula-variant-label" style="margin-top:12px"><span class="vi">📗</span>'+t('sheets_ver')+'</div>'+pillHTML(sh);}}
  const exHTML=f.example?'<div class="formula-example"><strong>'+t('example_word')+'</strong> <code>'+esc(f.example)+'</code></div>':'';
  const sepHTML=(!isSQL)?'<div class="sep-note">'+t('sep_note')+'</div>':'';
  const b1='<div class="block b-formula"><div class="block-header"><span class="block-icon">'+(isSQL?'🗄️':'🔢')+'</span><span class="block-label">'+(isSQL?t('lbl_formula_sql'):t('lbl_formula_sheet'))+'</span></div><div class="block-body">'+formulaInner+exHTML+sepHTML+'</div></div>';
  let b2='';const il=d.illus||{};
  if(il.headers&&il.rows){
    const cl=il.headers.map((_,i)=>'<th class="ch">'+(isSQL?'':String.fromCharCode(65+i))+'</th>').join('');
    const cn=il.headers.map(h=>'<th>'+esc(h)+'</th>').join('');
    const rows=il.rows.map((row,ri)=>{const cells=row.map(cell=>{const s=String(cell||'');const isF=s.startsWith('=');const isR=!isF&&/[0-9]/.test(s)&&ri===il.rows.length-1;return '<td class="'+(isF?'cell-formula':(isR?'cell-result':''))+'">'+esc(s)+'</td>';}).join('');return '<tr>'+(isSQL?'':'<td class="ch">'+(ri+1)+'</td>')+cells+'</tr>';}).join('');
    const corner=isSQL?'':'<th class="ch"></th>';
    b2='<div class="block b-illustration"><div class="block-header"><span class="block-icon">📋</span><span class="block-label">'+(isSQL?t('lbl_illus_sql'):t('lbl_illus_sheet'))+(il.title?' – '+esc(il.title):'')+'</span></div><div class="block-body"><div class="mini-sheet"><table><thead>'+(isSQL?'':'<tr>'+corner+cl+'</tr>')+'<tr>'+corner+cn+'</tr></thead><tbody>'+rows+'</tbody></table></div>'+(il.note?'<div class="sheet-note">💡 '+esc(il.note)+'</div>':'')+'</div></div>';
  }
  const e=d.expl||{};
  const anat=(e.anatomy||[]).map(a=>'<div class="anatomy-row"><span class="anat-part">'+esc(a.part)+'</span><span class="anat-desc">'+esc(a.meaning)+'</span></div>').join('');
  const b3='<div class="block b-explain"><div class="block-header"><span class="block-icon">💡</span><span class="block-label">'+(isSQL?t('lbl_explain_sql'):t('lbl_explain_sheet'))+'</span></div><div class="block-body"><div class="explain-summary">'+esc(e.summary||'')+'</div>'+(anat?'<div class="anatomy">'+anat+'</div>':'')+(e.tip?'<div class="tip-box">💬 <strong>'+t('tip_word')+'</strong> '+esc(e.tip)+'</div>':'')+'</div></div>';
  let b4='';const rel=d.related||[];
  if(rel.length){const items=rel.map(r=>'<div class="related-item"><span class="rel-chip disabled">'+esc(r.name||'')+'</span><span class="rel-desc">'+esc(r.kegunaan||r.use||'')+'</span></div>').join('');b4='<div class="block b-related"><div class="block-header"><span class="block-icon">🔗</span><span class="block-label">'+(isSQL?t('lbl_related_sql'):t('lbl_related_sheet'))+'</span></div><div class="block-body"><div class="related-list">'+items+'</div></div></div>';}
  appendEl('<div class="msg-ai"><div class="ai-header"><div class="ai-avatar">📊</div><span class="ai-name">Halodata</span><span class="src-tag src-ai">AI</span></div><div class="answer-blocks">'+b1+b2+b3+b4+'</div></div>');
}

async function askAI(query){
  const key=getKey(); if(!key){openSettings();return;}
  const isSQL=currentPlatform==='sql';
  showThinking(t('thinking_ai'));
  loading=true;document.getElementById('sendBtn').disabled=true;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':key,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:1500,messages:[{role:'user',content:aiSystem(isSQL)+'\n\nQuestion: '+query}]})});
    const data=await res.json();
    if(!res.ok) throw new Error(data&&data.error&&data.error.message?data.error.message:('HTTP '+res.status));
    const raw=(data.content||[]).map(c=>c.text||'').join('').trim();
    if(!raw) throw new Error('empty');
    const parsed=extractJSON(raw);
    removeThinking();renderAI(parsed,isSQL);
  }catch(err){removeThinking();appendEl('<div class="msg-ai"><div class="ai-header"><div class="ai-avatar">📊</div><span class="ai-name">Halodata</span></div><div class="err-block">😕 '+t('ai_fail')+esc(err.message)+'<br><br>'+t('ai_fail2')+'</div></div>');}
  finally{loading=false;document.getElementById('sendBtn').disabled=false;}
}

function showNotFound(query){
  const hasKey=!!getKey();
  const safe=esc(query).replace(/'/g,"\\'");
  const btn=hasKey?'<button class="nf-btn" onclick="askAI(\''+safe+'\')">'+t('nf_ai')+'</button>':'<button class="nf-btn" onclick="openSettings()">'+t('nf_addkey')+'</button>';
  appendEl('<div class="msg-ai"><div class="ai-header"><div class="ai-avatar">📊</div><span class="ai-name">Halodata</span></div><div class="notfound"><strong>'+t('nf_title')+'</strong><br>'+t('nf_body')+'<br>'+btn+'</div></div>');
}

/* ════════════ MAIN ════════════ */
function sendMessage(){
  if(loading)return;
  const ta=document.getElementById('userInput');const text=ta.value.trim();if(!text)return;
  const wb=document.getElementById('welcomeBlock');if(wb)wb.remove();
  ta.value='';autoResize(ta);showUserMsg(text);
  const hit=searchKB(text,currentPlatform);
  if(hit){renderEntry(hit,'local');ta.focus();return;}
  showNotFound(text);ta.focus();
}

/* ════════════ SETTINGS / LANG / PLATFORM ════════════ */
function setMode(){const has=!!getKey();const b=document.getElementById('modeBadge');b.textContent=has?'Hybrid':'Offline';b.style.background=has?'var(--purple-bg)':'var(--green-bg)';b.style.color=has?'var(--purple)':'var(--green)';b.style.borderColor=has?'#ddd6fe':'var(--green-mid)';}
function openSettings(){document.getElementById('apiKeyInput').value=getKey();updateKeyStatus();document.getElementById('overlay').classList.add('open');}
function closeSettings(){document.getElementById('overlay').classList.remove('open');}
function updateKeyStatus(){const s=document.getElementById('keyStatus');if(getKey()){s.className='key-status key-on';s.textContent=t('key_on');}else{s.className='key-status key-off';s.textContent=t('key_off');}}
function saveSettings(){const v=document.getElementById('apiKeyInput').value.trim();try{if(v)localStorage.setItem('halodata_key',v);else localStorage.removeItem('halodata_key');}catch(e){}setMode();updateKeyStatus();closeSettings();}
function clearKey(){try{localStorage.removeItem('halodata_key');}catch(e){}document.getElementById('apiKeyInput').value='';setMode();updateKeyStatus();}

function applyStaticI18n(){
  document.getElementById('tagline').textContent=t('tagline');
  document.getElementById('inputHint').textContent=t('hint');
  document.querySelector('[data-i18n="tab_sheet"]').textContent=t('tab_sheet');
  const ta=document.getElementById('userInput');
  ta.placeholder = currentPlatform==='sql'?t('ph_sql'):t('ph_sheet');
  document.getElementById('set_title').textContent=t('set_title');
  document.getElementById('set_desc').innerHTML=t('set_desc');
  document.getElementById('set_label').textContent=t('set_label');
  document.getElementById('set_note').innerHTML=t('set_note');
  document.getElementById('set_save').textContent=t('set_save');
  document.getElementById('set_clear').textContent=t('set_clear');
  document.getElementById('set_close').textContent=t('set_close');
  updateKeyStatus();
}
function setLang(l){
  LANG=l; try{localStorage.setItem('halodata_lang',l);}catch(e){}
  document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===l));
  document.documentElement.lang=l;
  applyStaticI18n();
  renderWelcome();
}
function setPlatform(p){
  currentPlatform=p;
  document.querySelectorAll('.tab').forEach(tb=>tb.classList.toggle('active',tb.dataset.plat===p));
  document.getElementById('userInput').placeholder=p==='sql'?t('ph_sql'):t('ph_sheet');
  renderWelcome();
}
function renderWelcome(){
  const isSQL=currentPlatform==='sql';
  const ex=EXAMPLES[currentPlatform].map(e=>'<button class="example-btn" onclick="sendExample(this.dataset.q)" data-q="'+esc(L(e.q))+'"><span class="eicon">'+e.icon+'</span><span>'+esc(L(e.label))+'</span></button>').join('');
  const title=isSQL?t('welcome_title_sql'):t('welcome_title_sheet');
  const sub=isSQL?t('welcome_sub_sql'):t('welcome_sub_sheet');
  document.getElementById('chatArea').innerHTML='<div id="welcomeBlock"><p class="welcome-title">'+title+'</p><p class="welcome-sub">'+sub+'</p><p class="examples-label">'+t('examples_label')+'</p><div class="examples-grid">'+ex+'</div></div>';
}

/* init */
document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.lang===LANG));
document.documentElement.lang=LANG;
setMode();
applyStaticI18n();
renderWelcome();
</script>
